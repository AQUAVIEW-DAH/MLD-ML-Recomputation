# Nginx site for the MLD historical replay prototype.
#
# Install target:
#   /etc/nginx/sites-available/mld-replay
#   /etc/nginx/sites-enabled/mld-replay -> ../sites-available/mld-replay
#
# The frontend is a static Vite build. API routes proxy to the local FastAPI
# service managed by systemd on 127.0.0.1:8001.

server {
    listen 80;
    listen [::]:80;

    # Replace `_` with a real domain when DNS is ready, e.g. mld.example.org.
    server_name _;

    root /home/suramya/MLD-ML-Recomputation/mld-dashboard/dist;
    index index.html;

    access_log /var/log/nginx/mld-replay.access.log;
    error_log /var/log/nginx/mld-replay.error.log;

    client_max_body_size 10m;

    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metadata {
        proxy_pass http://127.0.0.1:8001/metadata;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mld {
        proxy_pass http://127.0.0.1:8001/mld;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /map_layer {
        proxy_pass http://127.0.0.1:8001/map_layer;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
